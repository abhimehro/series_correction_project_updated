# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.25.0
# Many linters and tools depend on runtimes - configure them here. (https://docs.trunk.io/runtimes)
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
# This is the section where you manage your linters. (https://docs.trunk.io/check/configuration)
lint:
  disabled:
    - markdownlint
    - prettier
  enabled:
    - grype@0.114.0
    - pinact@4.1.0
    - actionlint@1.7.12
    - bandit@1.9.4
    - black@26.5.1
    - checkov@3.3.1
    - deno@2.5.6
    - dotenv-linter@4.0.0
    - git-diff-check
    - hadolint@2.14.0
    - isort@8.0.1
    - osv-scanner@2.3.8
    - ruff@0.15.17
    - shellcheck@0.11.0
    - shfmt@3.6.0
    - taplo@0.10.0
    - terrascan@1.19.9
    - trivy@0.71.0
    - trufflehog@3.95.5
    - yamllint@1.38.0
actions:
  disabled:
    - trufflehog-pre-commit
    - commitlint
    - trunk-check-pre-commit
    - trunk-fmt-pre-commit
  enabled:
    - trunk-check-pre-push
    - trunk-announce
    - trunk-upgrade-available
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
tools:
  disabled:
    - ruby
  enabled:
    - snyk@1.1295.0
    - trivy@0.71.0
    - trufflehog@3.95.5
